apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: user-service-network-policy
spec:
  podSelector:
    matchLabels:
      app: user-service
  policyTypes:
  - Ingress
  ingress:
  # Allow ingress-nginx controller to reach port 8081 for externally routed API traffic.
  # The ingress rules already restrict which paths are forwarded here — this is a second layer.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8081
  # Allow only the auth-service to reach port 8081 for the internal identity endpoints.
  # All other in-cluster pod-to-pod traffic to this service is denied by default.
  - from:
    - podSelector:
        matchLabels:
          app: auth-service
    ports:
    - protocol: TCP
      port: 8081
# NOTE: kindnet (kinD's default CNI) does not enforce NetworkPolicy.
# To enforce this locally, install Calico or Cilium into the kinD cluster.
# On a real cluster with a compliant CNI this is enforced automatically.
