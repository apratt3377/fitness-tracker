# DO NOT commit real credentials in this file.
# Populate the secret before deploying with:
#
#   kubectl create secret generic user-service-db-secret \
#     --from-literal=url='jdbc:postgresql://host.docker.internal:5432/accounts_db' \
#     --from-literal=username='postgres' \
#     --from-literal=password='postgres'
#
# For CI/CD pipelines, inject values from your secrets manager (Vault, AWS Secrets Manager, etc.)
# and apply with: kubectl apply -f - <<< "$(envsubst < secret.yaml)"
apiVersion: v1
kind: Secret
metadata:
  name: user-service-db-secret
type: Opaque
stringData:
  url: "REPLACE_ME"
  username: "REPLACE_ME"
  password: "REPLACE_ME"
