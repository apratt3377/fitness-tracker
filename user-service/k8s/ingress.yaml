apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: user-service-ingress
  # /internal/ is not routed by any ingress rule — NGINX returns 404 by default.
  # NetworkPolicy enforces in-cluster access restrictions.
  annotations: {}
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # Only the public user-facing API is exposed externally.
      # /internal/v1/identity/ is intentionally absent — accessible only via cluster-internal DNS.
      # /actuator/ is intentionally absent — scraped by Prometheus in-cluster, probed by kubelet directly.
      - path: /api/v1/users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 80
      - path: /api/v1/admin/users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 80
