apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: user-service-ingress
  annotations:
    # nginx.ingress.kubernetes.io/ingress.class is deprecated since K8s 1.18 — use spec.ingressClassName below.
    # Block /internal/ at the nginx level as defence-in-depth even though no ingress rule matches it.
    # Returns 404 (not 403) to avoid revealing that the path exists.
    nginx.ingress.kubernetes.io/server-snippet: |
      location ~* ^/internal/ {
        return 404;
      }
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # Only the public user-facing API is exposed externally.
      # /internal/v1/identity/ is intentionally absent — accessible only via cluster-internal DNS.
      # /actuator/ is intentionally absent — scraped by Prometheus in-cluster, probed by kubelet directly.
      - path: /api/v1/users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 80
      - path: /api/v1/admin/users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 80
